name: Try to Create OCI VM

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

env:
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  IMAGE_ID: ${{ secrets.IMAGE_ID }}
  SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  AD_NAME: ${{ secrets.AD_NAME }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  SUPPRESS_LABEL_WARNING: "True"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1

      - name: Add OCI CLI to path
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup OCI CLI and Try to Create VM
        id: create_vm
        continue-on-error: true
        run: |
          set -o pipefail

          pip install oci-cli

          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "region=${{ env.OCI_CLI_REGION }}" >> ~/.oci/config

          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/my_ssh_key.pub

          echo "Checking OCI inputs..."

          check_required() {
            name="$1"
            value="${!name}"
            if [ -z "$value" ]; then
              echo "$name: MISSING"
            else
              echo "$name: present"
            fi
          }

          check_required "COMPARTMENT_ID"
          check_required "SUBNET_ID"
          check_required "IMAGE_ID"
          check_required "AD_NAME"
          check_required "OCI_CLI_REGION"

          echo "Checking SSH public key format..."
          if grep -Eq '^(ssh-rsa|ssh-ed25519) ' /home/runner/my_ssh_key.pub; then
            echo "SSH_PUBLIC_KEY: OK"
          else
            echo "SSH_PUBLIC_KEY: BAD FORMAT"
            head -c 40 /home/runner/my_ssh_key.pub
            echo
          fi

          echo "Validating availability domains..."
          if oci iam availability-domain list --compartment-id "$COMPARTMENT_ID" >/tmp/ad.json 2>/tmp/ad.err; then
            echo "AD list: OK"
            if grep -q "\"name\": \"$AD_NAME\"" /tmp/ad.json; then
              echo "AD_NAME present: OK"
            else
              echo "AD_NAME present: FAIL"
              echo "Available ADs:"
              grep '"name"' /tmp/ad.json || true
            fi
          else
            echo "AD list: FAIL"
            cat /tmp/ad.err
          fi

          echo "Validating subnet..."
          if oci network subnet get --subnet-id "$SUBNET_ID" >/tmp/subnet.json 2>/tmp/subnet.err; then
            echo "Subnet: OK"
          else
            echo "Subnet: FAIL"
            cat /tmp/subnet.err
          fi

          echo "Validating image..."
          if oci compute image get --image-id "$IMAGE_ID" >/tmp/image.json 2>/tmp/image.err; then
            echo "Image: OK"
          else
            echo "Image: FAIL"
            cat /tmp/image.err
          fi

          echo "Preflight complete. Attempting launch..."

          OCI_OUTPUT=$(oci compute instance launch \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "$AD_NAME" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":2,"memoryInGBs":12}' \
            --subnet-id "$SUBNET_ID" \
            --image-id "$IMAGE_ID" \
            --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
            --assign-public-ip true \
            --display-name "free-arm-vm" \
            --boot-volume-size-in-gbs 100 2>&1 || true)

          echo "log_data<<EOF" >> $GITHUB_OUTPUT
          echo "$OCI_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
            echo "Success! VM is provisioning."
            exit 0
          else
            echo "VM not created yet."
            echo "$OCI_OUTPUT"
            exit 1
          fi

      - name: Send Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1.15.4
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "OCI VM Status: ${{ steps.create_vm.outcome }}"
          status: ${{ steps.create_vm.outcome }}
          description: |
            Attempt to create A1.Flex VM.

            Status: `${{ steps.create_vm.outcome }}`

            Log Output:
            ```json
            ${{ steps.create_vm.outputs.log_data }}
            ```
